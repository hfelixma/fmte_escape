<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room - Protocol Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'BladeRunnerCaptura'; src: url('BLADRMF.TTF') format('truetype'); }
        @font-face { font-family: 'MatrixLocal'; src: url('matrix.ttf') format('truetype'); }

        body {
            margin: 0; padding: 0; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background-color: black; transition: background 0.2s ease;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        .container { z-index: 2; padding: 40px; text-align: center; display: flex; flex-direction: column; align-items: center; width: 100%; }

        .hud-overlay { opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .hud-overlay.visible { opacity: 1; pointer-events: auto; }

        #timer { line-height: 1; margin-bottom: 20px; transition: all 0.3s; }
        #sub-timer { font-weight: bold; margin-bottom: 15px; }

        /* --- MODE CYBERPUNK --- */
        body.theme-cyberpunk { color: #ff0055; font-family: 'BladeRunnerCaptura', sans-serif; }
        body.theme-cyberpunk #timer { font-size: clamp(4rem, 15vw, 9rem); color: #00f3ff; text-shadow: 0 0 25px #00f3ff; transform: scaleX(1.2); }
        body.theme-cyberpunk #sub-timer { display: none !important; }

        /* --- MODE MATRIX --- */
        body.theme-matrix { color: #00FF00; font-family: 'MatrixLocal', monospace; }
        body.theme-matrix #timer { font-size: clamp(4rem, 15vw, 10rem); text-shadow: 0 0 20px #00FF00; }
        body.theme-matrix #sub-timer { font-family: 'MatrixLocal', monospace !important; font-size: calc(1.6rem + 3px); display: block; }
        body.theme-matrix #sub-timer span { font-family: 'Roboto Mono', monospace !important; margin-left: 10px; }
        body.theme-matrix #minutes-input { font-family: 'Roboto Mono', monospace !important; }

        body.theme-matrix.game-over-active #timer {
            font-family: 'MatrixLocal', monospace !important;
            color: #000 !important;
            text-shadow: 0 0 10px #00FF00, 0 0 20px #00FF00 !important;
        }

        .progress-line { width: 70%; height: 8px; margin-bottom: 30px; background: currentColor; box-shadow: 0 0 15px currentColor; }
        #status-text { font-size: clamp(1rem, 3vw, 1.8rem); min-height: 80px; }
        body.theme-matrix #status-text { font-size: calc(clamp(1rem, 3vw, 1.8rem) + 5px); } /* Incrementar 5 punts en estil Matrix */

        .controls { z-index: 3; display: flex; flex-direction: column; gap: 20px; }
        .row { display: flex; gap: 15px; align-items: center; justify-content: center; }

        input, select, button { background: #000; border: 2px solid currentColor; color: inherit; padding: 12px 20px; font-size: 1.1rem; font-family: inherit; border-radius: 6px; }
        button { cursor: pointer; font-weight: bold; }
        button:hover { background: white; color: black; }
        .hidden { display: none !important; }

        @keyframes alarm { 0% { background-color: #000; } 50% { background-color: #200; } }
        .alarm-active { animation: alarm 0.2s infinite !important; }
    </style>
</head>
<body class="theme-cyberpunk">

    <canvas id="background-canvas"></canvas>

    <div class="container">
        <div id="timer">30:00</div>
        <div id="sub-timer" class="hidden">COUNTDOWN TO EXTINTION: <span id="sub-timer-digits">30:00</span></div>
        <div class="progress-line"></div>
        <div id="status-text">SISTEMA REPLICANT ONLINE</div>
        
        <div id="setup-panel" class="controls">
            <div class="row">
                <select id="theme-select">
                    <option value="cyberpunk">Blade Runner</option>
                    <option value="matrix">Matrix</option>
                </select>
                <input type="number" id="minutes-input" value="30" min="1" style="width: 75px;">
                <button id="start-btn">INICIAR</button>
            </div>
        </div>

        <div id="active-panel" class="row hud-overlay">
            <button id="pause-btn">PAUSAR</button>
            <button id="reset-btn">REINICIAR</button>
        </div>
    </div>

    <script>
        const rawMessages = [
            "EL TEMPS VOLA I VOSALTRES NO", "SOU UN ERROr DE PrOGrAmACIO", "NO HI HA SOrTIDA D AQUEST BUCLE", 
            "L EXIT ES UNA ILLUSIO", "SOU DADES rESIDUALS", "EL SISTEmA US rEBUTJA", 
            "SOU rEPLICANTS DE SErIE B", "AIXO ES mASSA PEr A VOSALTrES", "rENDIr SE ES OPTIm",
            "ES COmO TENEr UN TIO EN GrANA, QUE NI TIENES TIO, NI TIENES NA",
            "ESTO VA ACABAr COmO EL rOSArIO DE LA AUrOrA",
            "ErES COmO TENEr UN TIO EN GrANA, QUE NI TIENES TIO, NI TIENES NA",
            "NO SEAIS COmO JUAN PALOmO, YO mE LO GUISO, YO mE LO COmO",
            "DESONFIEU, UN DE VOSALTrES ES UN INFILTrAT",
            "SOIS mAS LENTOS QUE EL CABALLO DEL mALO",
            "LA VOSTrA LOGICA FA AIGUES", "ERROr DE mATrIU HUmANA", "SOU LENTS COm UN PrOCESSADOr VELL",
            "SOU NOmES POLS EN LA PLUJA", "ESTEU FENT mOVImENTS INUTILS", "GAmE OVEr PEr AVANCAT"
        ];

        let timeRemaining, totalSeconds, countdownInterval, messageInterval, hudTimeout;
        let isPaused = false, isRunning = false;
        
        const escapeMusic = new Audio('escaperoom.mp3');
        escapeMusic.loop = true;
        escapeMusic.volume = 0.5;

        const body = document.body;
        const timerDisplay = document.getElementById('timer');
        const subTimerDisplay = document.getElementById('sub-timer');
        const subTimerDigits = document.getElementById('sub-timer-digits');
        const statusText = document.getElementById('status-text');
        const activePanel = document.getElementById('active-panel');

        function cleanText(text) {
            let t = text.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
            t = t.replace(/'/g, " "); 
            t = t.toUpperCase();
            if (body.classList.contains('theme-cyberpunk')) {
                return t.replace(/R/g, 'r').replace(/L/g, 'l').replace(/B/g, 'b');
            }
            return t;
        }

        // --- SO GAME OVER (SISTEMA FALLIT) ---
        function playDeathSound() {
            const deathSound = new Audio('Death.mp3');
            deathSound.volume = 1; // Volum alt
            deathSound.play().catch(()=>{});
        }

        function updateUIStrings() {
            document.getElementById('start-btn').innerText = cleanText("INICIAR");
            document.getElementById('pause-btn').innerText = cleanText(isPaused ? "REPrENDrE" : "PAUSAr");
            document.getElementById('reset-btn').innerText = cleanText("rEINICIAr");
            
            Array.from(document.getElementById('theme-select').options).forEach(opt => {
                opt.text = cleanText(opt.value === 'cyberpunk' ? "bLADE rUNNEr" : "mATrIX");
            });

            if (!isRunning) {
                statusText.innerText = cleanText(body.classList.contains('theme-matrix') ? "ACCES CODI" : "SISTEmA rEPLICANT ONLINE");
            }
        }

        function showHUD() {
            if (!isRunning || isPaused) return;
            activePanel.classList.add('visible');
            clearTimeout(hudTimeout);
            hudTimeout = setTimeout(() => {
                if (isRunning && !isPaused) activePanel.classList.remove('visible');
            }, 4000);
        }

        window.addEventListener('mousedown', showHUD);
        window.addEventListener('keydown', showHUD);

        function updateDisplay(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            const timeStr = `${m}:${sec < 10 ? '0' + sec : sec}`;
            if (body.classList.contains('theme-matrix') && isRunning) {
                const matrixChars = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉ0123456789";
                timerDisplay.innerText = timeStr.replace(/[0-9:]/g, () => matrixChars[Math.floor(Math.random()*matrixChars.length)]);
                subTimerDigits.innerText = timeStr;
            } else {
                timerDisplay.innerText = timeStr;
            }
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            const mins = document.getElementById('minutes-input').value;
            totalSeconds = mins * 60;
            timeRemaining = totalSeconds;
            isRunning = true;
            document.getElementById('setup-panel').classList.add('hidden');
            activePanel.classList.remove('hidden');
            if (body.classList.contains('theme-matrix')) subTimerDisplay.classList.remove('hidden');
            statusText.innerText = cleanText("SISTEmA ONLINE");
            escapeMusic.play().catch(()=>{});
            startTicker();
            showHUD();

            messageInterval = setInterval(() => {
                const msg = rawMessages[Math.floor(Math.random()*rawMessages.length)];
                statusText.innerText = cleanText(msg);
            }, 7000);
        });

        function startTicker() {
            countdownInterval = setInterval(() => {
                if (timeRemaining <= 0) {
                    clearInterval(countdownInterval);
                    clearInterval(messageInterval);
                    body.classList.add('alarm-active', 'game-over-active');
                    timerDisplay.innerText = cleanText("GAmE OVEr");
                    statusText.innerText = cleanText("SISTEmA FALLIT");
                    activePanel.classList.add('visible');
                    playDeathSound(); 
                    return;
                }
                timeRemaining--;
                updateDisplay(timeRemaining);
                if (timeRemaining <= (totalSeconds * 0.05)) {
                    escapeMusic.playbackRate = 1.5;
                } else {
                    escapeMusic.playbackRate = 1.0;
                }
            }, 1000);
        }

        document.getElementById('pause-btn').addEventListener('click', () => {
            if (!isPaused) {
                clearInterval(countdownInterval);
                escapeMusic.pause();
                isPaused = true;
                activePanel.classList.add('visible');
            } else {
                isPaused = false;
                escapeMusic.play().catch(()=>{});
                startTicker();
                showHUD();
            }
            updateUIStrings();
        });

        document.getElementById('reset-btn').addEventListener('click', () => location.reload());

        document.getElementById('theme-select').addEventListener('change', (e) => {
            body.className = 'theme-' + e.target.value;
            updateUIStrings();
            updateDisplay(document.getElementById('minutes-input').value * 60);
        });

        const canvas = document.getElementById('background-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        const fontSize = 18;
        const drops = Array(Math.floor(canvas.width / fontSize)).fill(1);

        function draw() {
            if (body.classList.contains('theme-matrix')) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0F0';
                ctx.font = fontSize + 'px monospace';
                drops.forEach((y, i) => {
                    const text = String.fromCharCode(0x30A0 + Math.random() * 96);
                    ctx.fillText(text, i * fontSize, y * fontSize);
                    if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            } else {
                ctx.fillStyle = 'rgba(2, 2, 6, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                drops.forEach((y, i) => {
                    ctx.beginPath();
                    const color = i % 2 === 0 ? '#00f3ff' : '#ff0055';
                    ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.shadowBlur = 10; ctx.shadowColor = color;
                    ctx.moveTo(i * fontSize * 1.5, y * fontSize);
                    ctx.lineTo(i * fontSize * 1.5, (y * fontSize) + 30);
                    ctx.stroke();
                    if (y * fontSize > canvas.height && Math.random() > 0.95) drops[i] = 0;
                    drops[i] += 1.5;
                });
                ctx.shadowBlur = 0;
            }
        }
        setInterval(draw, 33);
        updateUIStrings();
    </script>
</body>
</html>
