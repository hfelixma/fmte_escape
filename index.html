<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escape Room - Protocol Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&family=Stardos+Stencil:wght@700&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'BladeRunnerCaptura'; src: url('BLADRMF.TTF') format('truetype'); }
        @font-face { font-family: 'MatrixLocal'; src: url('matrix.ttf') format('truetype'); }

        body {
            margin: 0; padding: 0; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background-color: black; transition: background 0.5s ease;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        .container { z-index: 2; padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; width: 90%; max-width: 900px; }

        .hud-overlay { opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .hud-overlay.visible { opacity: 1; pointer-events: auto; }

        #timer { line-height: 1; margin-bottom: 20px; transition: all 0.3s; z-index: 2; }
        #sub-timer { font-weight: bold; margin-bottom: 15px; z-index: 2; }

        /* --- MODE CYBERPUNK (BLADE RUNNER) --- */
        body.theme-cyberpunk { color: #ff0055; font-family: 'BladeRunnerCaptura', sans-serif; }
        body.theme-cyberpunk #timer { font-size: clamp(3.5rem, 15vw, 8.5rem); color: #00f3ff; text-shadow: 0 0 25px #00f3ff; transform: scaleX(1.2); }
        body.theme-cyberpunk #sub-timer { display: none !important; }

        /* --- MODE MATRIX --- */
        body.theme-matrix { color: #00FF00; font-family: 'MatrixLocal', monospace; }
        body.theme-matrix #timer { font-size: clamp(4rem, 15vw, 10rem); text-shadow: 0 0 20px #00FF00; }
        body.theme-matrix #sub-timer { font-family: 'MatrixLocal', monospace !important; font-size: 1.8rem; display: block; color: #00FF00; }
        body.theme-matrix #sub-timer span { font-family: 'Roboto Mono', monospace !important; margin-left: 10px; }

        /* --- MODE LA CASA DE PAPEL --- */
        body.theme-lacasa { color: #ffffff; font-family: 'Stardos Stencil', cursive; }
        body.theme-lacasa #timer { font-size: clamp(4rem, 15vw, 10rem); color: #bc0000; text-shadow: 3px 3px 0px #000; }
        body.theme-lacasa #status-text { color: #bc0000; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px; font-size: 1.8rem; }
        body.theme-lacasa #sub-timer { font-family: 'Stardos Stencil', cursive; font-size: 1.8rem; color: #ffffff; display: block; }
        body.theme-lacasa #sub-timer span { font-family: 'Roboto Mono', monospace !important; margin-left: 10px; }

        .progress-line { width: 80%; height: 8px; margin-bottom: 30px; background: currentColor; z-index: 2; }
        #status-text { font-size: clamp(1rem, 3.5vw, 1.8rem); min-height: 80px; z-index: 2; }

        .controls { z-index: 3; display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .row { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }

        input, select, button { background: #000; border: 2px solid currentColor; color: inherit; padding: 10px 18px; font-size: 1.1rem; font-family: inherit; border-radius: 6px; }
        button { cursor: pointer; font-weight: bold; }
        button:hover { background: white; color: black; }
        .hidden { display: none !important; }

        @keyframes alarm { 0% { background-color: #000; } 50% { background-color: #200; } }
        .alarm-active { animation: alarm 0.2s infinite !important; }
    </style>
</head>
<body class="theme-cyberpunk">

    <canvas id="background-canvas"></canvas>

    <div class="container">
        <div id="timer">30:00</div>
        <div id="sub-timer" class="hidden">COUNTDOWN: <span id="sub-timer-digits">30:00</span></div>
        <div class="progress-line"></div>
        <div id="status-text">SISTEMA REPLICANT ONLINE</div>
        
        <div id="setup-panel" class="controls">
            <div class="row">
                <select id="theme-select">
                    <option value="cyberpunk">Blade Runner</option>
                    <option value="matrix">Matrix</option>
                    <option value="lacasa">La Casa de Papel</option>
                </select>
                <input type="number" id="minutes-input" value="30" min="1" style="width: 75px;">
                <button id="start-btn">INICIAR</button>
            </div>
        </div>

        <div id="active-panel" class="row hud-overlay">
            <button id="pause-btn">PAUSAR</button>
            <button id="reset-btn">REINICIAR</button>
        </div>
    </div>

    <script>
        const rawMessages = [
            "EL TEMPS VOLA I VOSALTRES NO", "ERROR EN EL CODI", "SOU DADES RESIDUALS",
            "ES COMO TENER UN TIO EN GRANA, QUE NI TIENES TIO, NI TIENES NA",
            "SOIS MAS LENTOS QUE EL CABALLO DEL MALO", "LA VOSTRA LOGICA FA AIGUES",
            "DESCONFIEU, UN DE VOSALTRES ES UN INFILTRAT", "COMENCA EL MATRIARCAT", "BELLA CIAO CIAO CIAO"
        ];

        let timeRemaining, totalSeconds, countdownInterval, messageInterval, hudTimeout;
        let isPaused = false, isRunning = false;
        
        const escapeMusic = new Audio('escaperoom.mp3');
        escapeMusic.loop = true;

        const body = document.body;
        const themeSelect = document.getElementById('theme-select');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resetBtn = document.getElementById('reset-btn');

        // Funció de mapeig estricte per a Blade Runner (B=98, R=114, L=108)
        function cleanText(text) {
            let t = text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/'/g, " ").toUpperCase();
            if (body.classList.contains('theme-cyberpunk')) {
                return t.replace(/B/g, 'b').replace(/R/g, 'r').replace(/L/g, 'l');
            }
            return t;
        }

        function updateUI() {
            startBtn.innerText = cleanText("INICIAR");
            pauseBtn.innerText = cleanText(isPaused ? "REPRENDRE" : "PAUSAR");
            resetBtn.innerText = cleanText("REINICIAR");
            
            themeSelect.options[0].text = cleanText("BLADE RUNNER");
            themeSelect.options[1].text = cleanText("MATRIX");
            themeSelect.options[2].text = cleanText("LA CASA DE PAPEL");

            if (!isRunning) {
                let msg = "SISTEMA ONLINE";
                if (body.classList.contains('theme-matrix')) msg = "ACCES CODI";
                if (body.classList.contains('theme-lacasa')) msg = "EL PLA ESTA EN MARXA";
                document.getElementById('status-text').innerText = cleanText(msg);
            }
        }

        // HUD: Només apareix amb Clic, Tecla o Touch
        function showHUD() {
            if (!isRunning || isPaused) return;
            document.getElementById('active-panel').classList.add('visible');
            clearTimeout(hudTimeout);
            hudTimeout = setTimeout(() => { if (isRunning && !isPaused) document.getElementById('active-panel').classList.remove('visible'); }, 4000);
        }

        window.addEventListener('mousedown', showHUD);
        window.addEventListener('keydown', showHUD);
        window.addEventListener('touchstart', showHUD);

        function updateDisplay(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            const timeStr = `${m}:${sec < 10 ? '0' + sec : sec}`;
            const timerDiv = document.getElementById('timer');
            const subDigits = document.getElementById('sub-timer-digits');

            if (isRunning && body.classList.contains('theme-matrix')) {
                const chars = "ｱｲｳｴｵｶｷｸｹｺ0123456789";
                timerDiv.innerText = timeStr.replace(/[0-9:]/g, () => chars[Math.floor(Math.random()*chars.length)]);
                subDigits.innerText = timeStr;
            } else {
                timerDiv.innerText = timeStr;
                if (isRunning) subDigits.innerText = timeStr;
            }
        }

        // INICIAR COMPTE ENRERE
        startBtn.onclick = function() {
            const mins = document.getElementById('minutes-input').value;
            totalSeconds = mins * 60;
            timeRemaining = totalSeconds;
            isRunning = true;

            document.getElementById('setup-panel').classList.add('hidden');
            document.getElementById('active-panel').classList.remove('hidden');
            
            if (body.classList.contains('theme-matrix')) {
                document.getElementById('sub-timer').classList.remove('hidden');
                document.getElementById('sub-timer').innerHTML = `COUNTDOWN TO EXTINTION: <span id="sub-timer-digits">${mins}:00</span>`;
            } else if (body.classList.contains('theme-lacasa')) {
                document.getElementById('sub-timer').classList.remove('hidden');
                document.getElementById('sub-timer').innerHTML = `TEMPS PEr A l ErUPCIO: <span id="sub-timer-digits">${mins}:00</span>`;
            }

            escapeMusic.play().catch(()=>{});
            
            countdownInterval = setInterval(() => {
                if (timeRemaining <= 0) {
                    clearInterval(countdownInterval);
                    body.classList.add('alarm-active');
                    document.getElementById('timer').innerText = cleanText("GAME OVER");
                    new Audio('Death.mp3').play().catch(()=>{});
                    return;
                }
                timeRemaining--;
                updateDisplay(timeRemaining);
                if (timeRemaining <= (totalSeconds * 0.05)) escapeMusic.playbackRate = 1.5;
            }, 1000);

            messageInterval = setInterval(() => {
                const msg = rawMessages[Math.floor(Math.random()*rawMessages.length)];
                document.getElementById('status-text').innerText = cleanText(msg);
            }, 7000);
            
            showHUD();
        };

        pauseBtn.onclick = function() {
            isPaused = !isPaused;
            if (isPaused) { 
                clearInterval(countdownInterval); 
                escapeMusic.pause(); 
                document.getElementById('active-panel').classList.add('visible'); 
            } else { 
                startBtn.onclick(); // Reprendre (re-llança l'interval amb el temps restant)
            }
            updateUI();
        };

        resetBtn.onclick = function() { location.reload(); };

        themeSelect.onchange = function() {
            body.className = 'theme-' + this.value;
            updateUI();
            updateDisplay(document.getElementById('minutes-input').value * 60);
        };

        // --- ANIMACIONS ---
        const canvas = document.getElementById('background-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        const drops = Array(Math.floor(canvas.width / 20)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (body.classList.contains('theme-matrix')) {
                ctx.fillStyle = '#0F0'; ctx.font = '20px MatrixLocal';
                drops.forEach((y, i) => {
                    ctx.fillText(String.fromCharCode(0x30A0 + Math.random() * 96), i * 20, y * 20);
                    if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            } else if (body.classList.contains('theme-lacasa')) {
                ctx.fillStyle = '#bc0000'; ctx.font = '24px Arial';
                drops.forEach((y, i) => {
                    ctx.fillText("€", i * 30, y * 20);
                    if (y * 20 > canvas.height && Math.random() > 0.96) drops[i] = 0;
                    drops[i] += 1.5;
                });
            } else {
                drops.forEach((y, i) => {
                    ctx.beginPath(); ctx.strokeStyle = i % 2 === 0 ? '#00f3ff' : '#ff0055';
                    ctx.moveTo(i * 30, y * 20); ctx.lineTo(i * 30, (y * 20) + 20); ctx.stroke();
                    if (y * 20 > canvas.height && Math.random() > 0.95) drops[i] = 0;
                    drops[i] += 2;
                });
            }
        }
        setInterval(draw, 33);
        updateUI();
    </script>
</body>
</html>
